<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavach-Edge | Ambulance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>KAVACH-EDGE</h2></div>
            <nav class="sidebar-menu">
                <a href="/" class="sidebar-link">🛡️ Core NOC</a>
                <a href="/traffic" class="sidebar-link">🚦 Smart Traffic</a>
                <a href="/air-quality" class="sidebar-link">💨 Air Quality</a>
                <a href="/ambulance" class="sidebar-link active">🚑 Ambulance Tracker</a>
                <a href="/agriculture" class="sidebar-link">🌾 Agri-Monitor</a>
            </nav>
        </aside>
        <div class="app-container">
            <header class="topbar">
                <div class="brand">
                    <span class="logo-icon">🚑</span>
                    <div class="brand-text">
                        <h1>SMART AMBULANCE & GREEN CORRIDOR</h1>
                        <span class="subtitle">Emergency Response Optimization</span>
                    </div>
                </div>
                <div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-primary" id="btn-corridor" style="background:var(--success); color:#000;">🟢 INITIATE GREEN CORRIDOR</button>
                    <select id="city-select" class="city-select">
                        <option value="12.9716,77.5946">Bangalore</option>
                        <option value="28.6139,77.2090">Delhi NCR</option>
                        <option value="19.0760,72.8777">Mumbai</option>
                        <option value="13.0827,80.2707">Chennai</option>
                        <option value="23.2599,77.4126">Bhopal</option>
                    </select>
                </div>
            </header>
            <div class="panel map-panel" style="height: 100%; min-height: 500px;">
                <div id="map" style="flex: 1; border-radius: 12px;"></div>
            </div>
        </div>
    </div>
    <!-- Toast Container -->
    <div id="toast-container"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/static/ambulance.js"></script>
</body>
</html>
